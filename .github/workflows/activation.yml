# Unity License Activation — GameCI v4
#
# The automated activation file action was deprecated in GameCI v4.
# Activation is now done LOCALLY via Unity Hub. Follow these steps once:
#
# 1. Install Unity Hub: https://unity.com/download
# 2. Log in with the Unity account you want to use for CI.
# 3. Unity Hub → Preferences → Licenses → Add → Get a free personal license.
# 4. Locate the generated .ulf file:
#      macOS:   /Library/Application Support/Unity/Unity_lic.ulf
#      Windows: C:\ProgramData\Unity\Unity_lic.ulf
#      Linux:   ~/.local/share/unity3d/Unity/Unity_lic.ulf
# 5. Add three GitHub secrets (Settings → Secrets and variables → Actions):
#      UNITY_LICENSE   — full contents of the .ulf file
#      UNITY_EMAIL     — Unity account email
#      UNITY_PASSWORD  — Unity account password
#
# Pro license? Skip UNITY_LICENSE. Add UNITY_SERIAL instead (XX-XXXX-XXXX-XXXX-XXXX-XXXX).
#
# This workflow verifies the secrets are present and the license activates
# correctly. Run it after adding the secrets to confirm everything works.

name: Verify Unity license

on:
  workflow_dispatch: {}

jobs:
  verify:
    name: Verify Unity license activation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets are set
        run: |
          missing=""
          [ -z "$UNITY_LICENSE" ]  && missing="$missing UNITY_LICENSE"
          [ -z "$UNITY_EMAIL" ]    && missing="$missing UNITY_EMAIL"
          [ -z "$UNITY_PASSWORD" ] && missing="$missing UNITY_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            echo "Follow the activation steps in .github/workflows/activation.yml"
            exit 1
          fi
          echo "All required secrets are present."
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Activation-${{ runner.os }}
          restore-keys: Library-Activation-

      - name: Activate and verify Unity license
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          unityVersion: auto
          testMode: EditMode
          # Run a no-op filter — exits immediately after license activation
          customParameters: -testFilter NonExistentTestThatWillNotMatch
          githubToken: ${{ secrets.GITHUB_TOKEN }}
