# CI — Spirits of the Crossing
#
# Runs on every pull request targeting the production branch.
# Executes all Unity EditMode and PlayMode tests (including
# UpsilonSphereBootstrapTests) and publishes results as a check.
#
# Prerequisites (add once via Settings → Secrets and variables → Actions):
#   UNITY_LICENSE   — contents of the .ulf file from the activation workflow
#   UNITY_EMAIL     — Unity account email
#   UNITY_PASSWORD  — Unity account password
#
# Pro license instead of Personal? Replace UNITY_LICENSE with:
#   UNITY_SERIAL    — the serial key from your Pro subscription
#   (and remove the UNITY_LICENSE env var below)
#
# NOTE: This workflow expects a Unity project at the repository root, i.e.
# Assets/, ProjectSettings/, and Packages/ must exist at the top level.
# SpiritsCrossing_Core/ should live under Assets/Scripts/.

name: CI

on:
  pull_request:
    branches:
      - production

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unity Tests (${{ matrix.testMode }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        testMode:
          - EditMode
          - PlayMode

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      # Cache the Unity Library folder — cuts test time by 50%+ on repeat runs
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Test-${{ matrix.testMode }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Test-${{ matrix.testMode }}-
            Library-Test-
            Library-

      - name: Run ${{ matrix.testMode }} tests
        uses: game-ci/unity-test-runner@v4
        id: tests
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          unityVersion: auto
          testMode: ${{ matrix.testMode }}
          artifactsPath: test-results/${{ matrix.testMode }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: Unity ${{ matrix.testMode }} Test Results
          # Run only the UpsilonPath tests in PlayMode; all tests in EditMode
          customParameters: >-
            ${{ matrix.testMode == 'PlayMode'
              && '-testFilter SpiritsCrossing.Tests'
              || '' }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.testMode }}
          path: ${{ steps.tests.outputs.artifactsPath }}
          retention-days: 14
